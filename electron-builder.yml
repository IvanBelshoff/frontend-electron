appId: com.datadash.admin
productName: DataDash Admin
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
mac:
  target:
    - dmg
    - zip
  category: public.app-category.business
# Evita download/extração do winCodeSign (symlinks macOS) em builds locais sem certificado.
forceCodeSigning: false
win:
  target:
    - nsis
  signAndEditExecutable: false
linux:
  target:
    - AppImage
    - deb
